openapi: 3.0.3

info:
  title: Miniapp Platform API
  version: 1.0.0
  description: |
    API Gateway для платформы miniapps/webview.

    Основная логика:
    - Пользователь регистрируется только как user.
    - Admin может быть создан вручную в БД или назначен другим admin.
    - User видит опубликованные miniapps и может предлагать новые miniapps.
    - Admin управляет miniapps: publish, reject, edit, disable, enable, delete.
    - Запуск miniapp происходит через launch_token, который связывает user + miniapp.
    - Access JWT не передается внешнему miniapp.

servers:
  - url: http://localhost:8080
    description: Local api-service

tags:
  - name: Health
    description: Проверка состояния сервиса
  - name: Auth
    description: Регистрация, логин, refresh, logout
  - name: User Miniapps
    description: Действия обычного пользователя с miniapps
  - name: Admin Miniapps
    description: Админское управление miniapps
  - name: Admin Users
    description: Управление пользователями и ролями
  - name: Miniapp Sessions
    description: Получение контекста запуска miniapp по launch token
  - name: Favorites
    description: Избранные miniapps пользователя

security:
  - BearerAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check api-service
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Register new user
      description: Регистрирует нового пользователя. Роль всегда user.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie.
              schema:
                type: string
                example: refresh_token=refresh_token_value; HttpOnly; Secure; SameSite=Lax; Path=/api/auth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              description: HttpOnly refresh token cookie.
              schema:
                type: string
                example: refresh_token=refresh_token_value; HttpOnly; Secure; SameSite=Lax; Path=/api/auth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Reads refresh_token from HttpOnly cookie and rotates it.
      security:
        - RefreshCookie: []
      responses:
        "200":
          description: Access token refreshed successfully
          headers:
            Set-Cookie:
              description: Rotated HttpOnly refresh token cookie.
              schema:
                type: string
                example: refresh_token=refresh_token_value; HttpOnly; Secure; SameSite=Lax; Path=/api/auth
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Logout user
      description: Reads refresh_token from HttpOnly cookie, revokes the refresh session, and clears the cookie.
      security:
        - RefreshCookie: []
      responses:
        "204":
          description: Logout successful
          headers:
            Set-Cookie:
              description: Expired refresh token cookie.
              schema:
                type: string
                example: refresh_token=; HttpOnly; Secure; SameSite=Lax; Path=/api/auth; Max-Age=0
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/auth/me:
    get:
      tags:
        - Auth
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags:
        - Auth
      summary: Delete own account
      description: Deactivates the current user and revokes all refresh sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountRequest"
      responses:
        "204":
          description: Account deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/me/name:
    patch:
      tags:
        - Auth
      summary: Change current user name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNameRequest"
      responses:
        "200":
          description: User name updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/me/email:
    patch:
      tags:
        - Auth
      summary: Change current user email
      description: Requires current password and revokes all refresh sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmailRequest"
      responses:
        "200":
          description: User email updated
          headers:
            Set-Cookie:
              description: Expired refresh token cookie.
              schema:
                type: string
                example: refresh_token=; HttpOnly; Secure; SameSite=Lax; Path=/api/auth; Max-Age=0
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/auth/me/password:
    patch:
      tags:
        - Auth
      summary: Change current user password
      description: Requires current password and revokes all refresh sessions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePasswordRequest"
      responses:
        "200":
          description: User password updated
          headers:
            Set-Cookie:
              description: Expired refresh token cookie.
              schema:
                type: string
                example: refresh_token=; HttpOnly; Secure; SameSite=Lax; Path=/api/auth; Max-Age=0
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/miniapps:
    get:
      tags:
        - User Miniapps
      summary: Get miniapps
      description: Для user возвращает miniapps во всех статусах кроме deleted.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Поиск по title/description.
      responses:
        "200":
          description: List of miniapps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniappListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags:
        - User Miniapps
      summary: Suggest new miniapp
      description: User предлагает miniapp. Он создается со статусом pending.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMiniappRequest"
      responses:
        "201":
          description: Miniapp suggestion created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Miniapp"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /api/miniapps/{miniapp_id}:
    get:
      tags:
        - User Miniapps
      summary: Get miniapp by id
      description: User может получить только active miniapp.
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      responses:
        "200":
          description: Miniapp details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Miniapp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/miniapps/{miniapp_id}/launch:
    post:
      tags:
        - User Miniapps
      summary: Launch miniapp
      description: |
        Создает launch_token для пары user + miniapp.
        Если miniapp disabled/pending/deleted, запуск запрещен.
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      responses:
        "200":
          description: Launch URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LaunchMiniappResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/miniapps/{miniapp_id}/favorite:
    post:
      tags:
        - Favorites
      summary: Add miniapp to favorites
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      responses:
        "201":
          description: Added to favorites
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Favorites
      summary: Remove miniapp from favorites
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      responses:
        "204":
          description: Removed from favorites
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/favorites:
    get:
      tags:
        - Favorites
      summary: Get current user's favorite miniapps
      responses:
        "200":
          description: Favorite miniapps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniappListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/admin/miniapps:
    get:
      tags:
        - Admin Miniapps
      summary: Get all miniapps
      description: Admin видит active, pending, disabled, deleted.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/MiniappStatus"
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of all miniapps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniappListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags:
        - Admin Miniapps
      summary: Create miniapp as admin
      description: Admin создает miniapp. По умолчанию можно создать сразу active.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateMiniappRequest"
      responses:
        "201":
          description: Miniapp created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Miniapp"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/miniapps/{miniapp_id}:
    get:
      tags:
        - Admin Miniapps
      summary: Get any miniapp by id
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      responses:
        "200":
          description: Miniapp details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Miniapp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags:
        - Admin Miniapps
      summary: Update miniapp
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMiniappRequest"
      responses:
        "200":
          description: Miniapp updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Miniapp"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags:
        - Admin Miniapps
      summary: Delete miniapp
      description: Можно реализовать как soft delete через status=deleted.
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      responses:
        "204":
          description: Miniapp deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/miniapps/{miniapp_id}/publish:
    post:
      tags:
        - Admin Miniapps
      summary: Publish pending miniapp
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      responses:
        "200":
          description: Miniapp published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Miniapp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/miniapps/{miniapp_id}/reject:
    post:
      tags:
        - Admin Miniapps
      summary: Reject pending miniapp
      description: Admin отклоняет pending miniapp. После вызова pending miniapp удаляется.
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      responses:
        "204":
          description: Pending miniapp rejected and deleted
        "400":
          description: Miniapp is not pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/miniapps/{miniapp_id}/enable:
    post:
      tags:
        - Admin Miniapps
      summary: Enable miniapp
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      responses:
        "200":
          description: Miniapp enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Miniapp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/miniapps/{miniapp_id}/disable:
    post:
      tags:
        - Admin Miniapps
      summary: Disable miniapp
      parameters:
        - $ref: "#/components/parameters/MiniappIdParam"
      responses:
        "200":
          description: Miniapp disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Miniapp"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/users:
    get:
      tags:
        - Admin Users
      summary: Get users
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: role
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UserRole"
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search by email/name.
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/user:
    post:
      tags:
        - Admin Users
      summary: Get user by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetUserRequest"
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/users/promote:
    post:
      tags:
        - Admin Users
      summary: Promote user to admin by email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoteUserRequest"
      responses:
        "200":
          description: User promoted to admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/users/{user_id}/deactivate:
    post:
      tags:
        - Admin Users
      summary: Deactivate user
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: User deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/users/{user_id}/activate:
    post:
      tags:
        - Admin Users
      summary: Activate user
      parameters:
        - $ref: "#/components/parameters/UserIdParam"
      responses:
        "200":
          description: User activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/miniapp-sessions/{launch_token}:
    get:
      tags:
        - Miniapp Sessions
      summary: Get miniapp launch session context
      description: |
        Endpoint для внешнего miniapp.
        По launch_token возвращает контекст пользователя и miniapp.
        Access JWT сюда не нужен.
      security: []
      parameters:
        - name: launch_token
          in: path
          required: true
          schema:
            type: string
          description: Temporary launch token.
      responses:
        "200":
          description: Miniapp session context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MiniappSessionContext"
        "401":
          description: Invalid or expired launch token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    RefreshCookie:
      type: apiKey
      in: cookie
      name: refresh_token

  parameters:
    MiniappIdParam:
      name: miniapp_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    UserIdParam:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 6
          example: password123
        name:
          type: string
          example: Amir

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: password123

    UpdateNameRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Amir

    UpdateEmailRequest:
      type: object
      required:
        - email
        - current_password
      properties:
        email:
          type: string
          format: email
          example: new@example.com
        current_password:
          type: string
          minLength: 6
          example: password123

    UpdatePasswordRequest:
      type: object
      required:
        - current_password
        - new_password
      properties:
        current_password:
          type: string
          minLength: 6
          example: password123
        new_password:
          type: string
          minLength: 6
          example: newpass123

    DeleteAccountRequest:
      type: object
      required:
        - current_password
      properties:
        current_password:
          type: string
          minLength: 6
          example: password123

    AuthResponse:
      type: object
      required:
        - access_token
        - user
      properties:
