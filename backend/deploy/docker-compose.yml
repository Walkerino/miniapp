services:
  auth-db:
    image: postgres:16-alpine
    container_name: miniapp-auth-db
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-miniapp_auth_db_password}
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: miniapp-auth-service
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      SERVER_ADDR: :8080
      USER_DB_URL: postgres://postgres:${AUTH_DB_PASSWORD:-miniapp_auth_db_password}@auth-db:5432/auth?sslmode=disable
      TOKEN_DB_URL: postgres://postgres:${AUTH_DB_PASSWORD:-miniapp_auth_db_password}@auth-db:5432/auth?sslmode=disable
      MIGRATIONS_DB_URL: postgres://postgres:${AUTH_DB_PASSWORD:-miniapp_auth_db_password}@auth-db:5432/auth?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-miniapp_jwt_secret_change_me}
      JWT_ACCESS_TTL: 1h
      JWT_REFRESH_TTL: 720h
      BCRYPT_COST: 12
      DB_WAIT_RETRIES: 30
      DB_WAIT_DELAY_SECONDS: 2
    ports:
      - "8081:8080"
    restart: unless-stopped

  miniapp-db:
    image: postgres:16-alpine
    container_name: miniapp-miniapp-db
    environment:
      POSTGRES_DB: miniapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${MINIAPP_DB_PASSWORD:-miniapp_service_db_password}
    ports:
      - "5434:5432"
    volumes:
      - miniapp-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d miniapp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  miniapp-service:
    build:
      context: ../services/miniapp-service
      dockerfile: Dockerfile
    container_name: miniapp-miniapp-service
    depends_on:
      miniapp-db:
        condition: service_healthy
    environment:
      SERVER_ADDR: :8080
      MINIAPP_DB_URL: postgres://postgres:${MINIAPP_DB_PASSWORD:-miniapp_service_db_password}@miniapp-db:5432/miniapp?sslmode=disable
      MIGRATIONS_DB_URL: postgres://postgres:${MINIAPP_DB_PASSWORD:-miniapp_service_db_password}@miniapp-db:5432/miniapp?sslmode=disable
      LAUNCH_TOKEN_TTL: 5m
      DB_WAIT_RETRIES: 30
      DB_WAIT_DELAY_SECONDS: 2
    ports:
      - "8082:8080"
    restart: unless-stopped

  ai-db:
    image: postgres:16-alpine
    container_name: miniapp-ai-db
    environment:
      POSTGRES_DB: ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AI_DB_PASSWORD:-miniapp_ai_db_password}
    ports:
      - "5435:5432"
    volumes:
      - ai-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ai-service:
    build:
      context: ../services/ai-service
      dockerfile: Dockerfile
    container_name: miniapp-ai-service
    depends_on:
      ai-db:
        condition: service_healthy
      miniapp-service:
        condition: service_started
    environment:
      SERVER_ADDR: :8080
      AI_DB_URL: postgres://postgres:${AI_DB_PASSWORD:-miniapp_ai_db_password}@ai-db:5432/ai?sslmode=disable
      MIGRATIONS_DB_URL: postgres://postgres:${AI_DB_PASSWORD:-miniapp_ai_db_password}@ai-db:5432/ai?sslmode=disable
      MINIAPP_SERVICE_URL: http://miniapp-service:8080
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-openrouter/free}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-30s}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1500}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      DB_WAIT_RETRIES: 30
      DB_WAIT_DELAY_SECONDS: 2
    ports:
      - "8083:8080"
    restart: unless-stopped

  api-service:
    build:
      context: ../services/api-service
      dockerfile: Dockerfile
    container_name: miniapp-api-service
    depends_on:
      auth-service:
        condition: service_started
      miniapp-service:
        condition: service_started
      ai-service:
        condition: service_started
    environment:
      SERVER_ADDR: :8080
      AUTH_SERVICE_URL: http://auth-service:8080
      MINIAPP_SERVICE_URL: http://miniapp-service:8080
      AI_SERVICE_URL: http://ai-service:8080
      REQUEST_TIMEOUT: 90s
      CORS_ALLOWED_ORIGINS: "*"
      CORS_ALLOWED_METHODS: GET,POST,PATCH,DELETE,OPTIONS
      CORS_ALLOWED_HEADERS: Authorization,Content-Type,X-Requested-With
      CORS_ALLOW_CREDENTIALS: "true"
    ports:
      - "8086:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: miniapp-frontend
    depends_on:
      api-service:
        condition: service_started
    ports:
      - "8080:80"
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: miniapp-swagger-ui
    ports:
      - "8085:8080"
    environment:
      SWAGGER_JSON: /docs/openapi.yaml
    volumes:
      - ../services/api-service/docs/openapi.yaml:/docs/openapi.yaml:ro
    restart: unless-stopped

volumes:
  auth-db-data:
  miniapp-db-data:
  ai-db-data:
