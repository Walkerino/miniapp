services:
  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: miniapp-swagger-ui
    ports:
      - "8088:8080"
    environment:
      SWAGGER_JSON: /docs/openapi.yaml
    volumes:
      - ../services/api-service/docs/openapi.yaml:/docs/openapi.yaml:ro
    restart: unless-stopped